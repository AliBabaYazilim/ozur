<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tıklar mısın? Senin için yaptım ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: radial-gradient(circle at center, #fff5f8 0%, #ffe4ec 70%, #ffc1d1 100%);
            height: 100vh; width: 100vw;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            font-family: 'Poppins', sans-serif; overflow: hidden; padding: 40px 0;
        }

        /* 1. SÜSLEME: Uçuşan Parıltılar */
        #particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .particle {
            position: absolute; background: white; border-radius: 50%; opacity: 0.6;
            animation: float 12s linear infinite;
        }
        @keyframes float { 0% { transform: translateY(110vh) scale(0); } 100% { transform: translateY(-10vh) scale(1.2); } }

        /* 2. SÜSLEME: Garden & Vazo */
        .garden {
            position: relative; width: 100%; height: 60vh;
            display: flex; justify-content: center; align-items: flex-end; z-index: 10;
        }

        .vase {
            width: 90px; height: 110px;
            background: rgba(255, 255, 255, 0.25);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 15px 15px 45px 45px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 20; position: relative;
            box-shadow: 0 10px 40px rgba(216, 27, 96, 0.1);
        }

        /* 3. LALELER VE GERÇEK YAPRAKLAR */
        .flowers { position: absolute; bottom: 65px; display: flex; justify-content: center; align-items: flex-end; width: 100%; }
        
        .tulip { position: absolute; display: flex; flex-direction: column; align-items: center; transform-origin: bottom center; }

        .head {
            width: 52px; height: 62px; border-radius: 28px 28px 18px 18px;
            position: relative; z-index: 5;
            box-shadow: inset -6px -12px 25px rgba(0,0,0,0.2), 0 5px 15px rgba(216, 27, 96, 0.1);
            opacity: 0; animation: pop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        /* Lale yaprak detayları (Kanatlar) */
        .head::before, .head::after {
            content: ''; position: absolute; top: -7px; width: 32px; height: 52px;
            background: inherit; border-radius: 25px 25px 8px 8px; filter: brightness(1.2);
        }
        .head::before { left: -7px; transform: rotate(-22deg); }
        .head::after { right: -7px; transform: rotate(22deg); }

        .stem {
            width: 7px; height: 0;
            background: linear-gradient(to bottom, #4caf50 0%, #2d5a27 100%);
            border-radius: 12px; animation: grow 3s ease-out forwards;
            position: relative; z-index: 1;
        }

        /* İSTEDİĞİN O YAPRAKLAR (HTML DİV OLARAK) */
        .leaf {
            position: absolute; width: 28px; height: 18px;
            background: linear-gradient(135deg, #4caf50 0%, #2d5a27 100%);
            opacity: 0; animation: leafPop 1s ease-out forwards;
            z-index: 2;
        }
        .leaf.left {
            left: -24px; top: 35%; border-radius: 0 100px 0 100px;
            transform: rotate(-30deg) scale(0);
        }
        .leaf.right {
            right: -28px; top: 55%; border-radius: 100px 0 100px 0;
            transform: rotate(20deg) scale(0);
        }

        /* ANIMASYONLAR */
        @keyframes grow { to { height: 230px; } }
        @keyframes pop { 0% { opacity: 0; transform: scale(0) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes leafPop { 0% { opacity: 0; transform: scale(0); } 100% { opacity: 1; transform: scale(1); } }

        /* RENKLER VE GECİKMELER */
        .t1 { transform: rotate(-35deg); }
        .t1 .head { background: linear-gradient(135deg, #ff1744, #d81b60); animation-delay: 0.7s; }
        .t1 .stem { animation-delay: 0.4s; } .t1 .leaf { animation-delay: 1.8s; }

        .t2 { transform: rotate(-15deg); }
        .t2 .head { background: linear-gradient(135deg, #f50057, #ad1457); animation-delay: 1.2s; }
        .t2 .stem { animation-delay: 0.9s; } .t2 .leaf { animation-delay: 2.3s; }

        .t3 { transform: rotate(0deg); }
        .t3 .head { background: linear-gradient(135deg, #d81b60, #880e4f); animation-delay: 1.7s; }
        .t3 .stem { animation-delay: 1.4s; } .t3 .leaf { animation-delay: 2.8s; }

        .t4 { transform: rotate(15deg); }
        .t4 .head { background: linear-gradient(135deg, #ff4081, #f50057); animation-delay: 2.2s; }
        .t4 .stem { animation-delay: 1.9s; } .t4 .leaf { animation-delay: 3.3s; }

        .t5 { transform: rotate(35deg); }
        .t5 .head { background: linear-gradient(135deg, #ad1457, #ff1744); animation-delay: 2.7s; }
        .t5 .stem { animation-delay: 2.4s; } .t5 .leaf { animation-delay: 3.8s; }

        /* MESAJ */
        .ui { text-align: center; opacity: 0; animation: fade 2s forwards 5.5s; padding: 0 20px; z-index: 30; }
        h1 { font-family: 'Dancing Script'; color: #880e4f; font-size: 2.5rem; margin-bottom: 5px; }
        .btn {
            display: inline-block; margin-top: 20px; padding: 15px 40px;
            background: #25D366; color: white; text-decoration: none;
            border-radius: 50px; font-weight: 600; box-shadow: 0 10px 25px rgba(37,211,102,0.3);
        }
        @keyframes fade { to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="particles"></div>

    <div class="garden">
        <div class="flowers">
            <div class="tulip t1"><div class="head"></div><div class="stem"><div class="leaf left"></div><div class="leaf right"></div></div></div>
            <div class="tulip t2"><div class="head"></div><div class="stem"><div class="leaf left"></div><div class="leaf right"></div></div></div>
            <div class="tulip t3"><div class="tulip-head head"></div><div class="stem"><div class="leaf left"></div><div class="leaf right"></div></div></div>
            <div class="tulip t4"><div class="head"></div><div class="stem"><div class="leaf left"></div><div class="leaf right"></div></div></div>
            <div class="tulip t5"><div class="head"></div><div class="stem"><div class="leaf left"></div><div class="leaf right"></div></div></div>
        </div>
        <div class="vase"></div>
    </div>

    <div class="ui">
        <h1>Canım Teyzem ❤️</h1>
        <p>Seni kırdığım için çok üzgünüm.<br>Ben seni çok özlediğimden ve yanında olamadığmdan biraz asabileşmiş olabilirim :[<br>ZATEN Bİ TANE TEYZEM VAR ONU DA KAYBEDEMEM BENİ DELİRTMEYİN YAW<br>Lütfen beni affet.</p>
        <a href="https://wa.me/905387162808?text=+Affettim+seni+esek+sıpası muck :)." class="btn">Beni Affettiysen tıkla ;) 🌷</a>
    </div>

    <script>
        const pc = document.getElementById('particles');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.top = Math.random() * 100 + 'vh';
            const s = Math.random() * 4 + 2 + 'px';
            p.style.width = p.style.height = s;
            p.style.animationDelay = Math.random() * 10 + 's';
            pc.appendChild(p);
        }
        window.onload = function() {
        document.title = "Sana Özel Canlı Bahçe ❤️"; 
    };
    </script>
</body>
</html>
